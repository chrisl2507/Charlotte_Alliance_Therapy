# Netlify configuration for Alliance Therapy Ltd
# No build command needed — pure static HTML/CSS

[build]
  publish = "."

# Custom 404 page
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# Cache static assets
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
